services:
  app:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "node -e \"require('http').createServer((req,res)=>{res.writeHead(200,{'content-type':'application/json'});res.end(JSON.stringify({status:'ok',service:process.env.APP_NAME||'launchops-app'}))}).listen(process.env.APP_PORT||3000)\""
    environment:
      APP_NAME: ${APP_NAME:-launchops-app}
      APP_PORT: ${APP_PORT:-3000}
      NODE_ENV: ${NODE_ENV:-production}
    expose:
      - "${APP_PORT:-3000}"
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/app.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    restart: unless-stopped
